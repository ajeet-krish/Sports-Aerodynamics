project:
  type: website
  output-dir: ./docs
  render:
    - index.qmd
    - theory.qmd
    - tactical.qmd
    - shot.qmd

website:
  title: "The Physics of Play"
  description: "Aerodynamics in Summer Sports & FIFA World Cup 2026 — CFD simulations with ΦFlow"
  repo-url: https://github.com/ajeetdash/Sports-Aerodynamics
  repo-actions: [source]

  navbar:
    background: dark
    left:
      - href: index.qmd
        text: Home
      - href: theory.qmd
        text: Theory
      - href: tactical.qmd
        text: Tactical
      - href: shot.qmd
        text: Shot Aerodynamics

  page-footer:
    center: "© 2026 · The Physics of Play

  twitter-card:
    title: "The Physics of Play"
    description: "Aerodynamics in Summer Sports & FIFA World Cup 2026"

format:
  html:
    theme: darkly
    code-copy: true
    code-overflow: wrap
    toc: true
    toc-location: left
    toc-depth: 3
    number-sections: false
    smooth-scroll: true
    link-external-icon: true
    css: custom.css
    anchor-sections: true
